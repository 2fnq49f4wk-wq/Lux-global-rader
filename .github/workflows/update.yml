name: Update News Data
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run scraper
        run: python main.py

      - name: Commit & Push
        run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          git add docs/data.json
          git diff-index --quiet HEAD || git commit -m "Update $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
